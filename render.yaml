services:
  - type: web
    name: resume-builder-server
    env: node
    plan: free
    root: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromDatabase:
          name: resume-builder-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://resumebuilder-opal-five.vercel.app

  - type: web
    name: resume-builder-client
    env: node
    plan: free
    root: client
    buildCommand: npm install && npm run build
    startCommand: npm start

databases:
  - name: resume-builder-db
    databaseName: resume-builder
    plan: free
